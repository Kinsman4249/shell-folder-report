# =============================================================================
# Release workflow template
# =============================================================================
#
# Builds your project's artifacts on a tag push and attaches them to a GitHub
# Release. Works for apps and tools (no registry publishing).
#
# HOW TO USE THIS TEMPLATE
# -------------------------
# 1. Copy this file to .github/workflows/release.yml in your project repo.
# 2. Find the two "=== EDIT THIS SECTION ===" blocks below.
# 3. Uncomment the lines for your language; delete or leave the others commented.
# 4. Adjust the binary name / build command for your project if needed.
# 5. Commit and push.
#
# CUTTING YOUR FIRST RELEASE
# --------------------------
# From your local clone:
#
#     git tag v0.1.0
#     git push --tags
#
# A new GitHub Release will appear under the "Releases" tab once the workflow
# finishes (a couple of minutes). Bump the version for subsequent releases:
# v0.2.0, v1.0.0, v1.0.1, etc. (See: https://semver.org)
#
# RUNNING MANUALLY
# ----------------
# Repo > Actions tab > Release > Run workflow. Enter an existing tag.
#
# =============================================================================

name: Release

on:
  # Auto-trigger when you push a version tag like v0.1.0 / v1.2.3.
  push:
    tags:
      - 'v*.*.*'
  # Manual fallback. Lets you re-run a release from the Actions tab.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true
        type: string

# Required so the workflow can create the GitHub Release.
permissions:
  contents: write

jobs:
  # ===========================================================================
  # BUILD: runs once per OS in the matrix, produces artifacts.
  # ===========================================================================
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build on three OSes so users can download the right binary.
        # Trim this list to just [ubuntu-latest] if you don't need cross-platform builds.
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # On manual runs, check out the tag the user typed; otherwise the pushed tag.
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      # =======================================================================
      # === EDIT THIS SECTION (1/2): language toolchain setup ================
      # =======================================================================
      # Uncomment ONE block matching your language.

      # --- Go ---
      # - name: Set up Go
      #   uses: actions/setup-go@v5
      #   with:
      #     go-version: '1.22'

      # --- Node / TypeScript ---
      # - name: Set up Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #     cache: 'npm'

      # --- Python ---
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'

      # --- Rust ---
      # - name: Set up Rust
      #   uses: dtolnay/rust-toolchain@stable

      # --- Java (Temurin / Gradle) ---
      # - name: Set up JDK
      #   uses: actions/setup-java@v4
      #   with:
      #     distribution: 'temurin'
      #     java-version: '21'

      # --- Shell / no compilation needed ---
      # (no setup step required; bash is preinstalled on every runner)

      # =======================================================================
      # === EDIT THIS SECTION (2/2): build command ===========================
      # =======================================================================
      # Uncomment ONE block matching your language. Adjust paths/names as needed.

      # --- Go ---
      # - name: Build binary
      #   shell: bash
      #   run: |
      #     mkdir -p dist
      #     ext=""; [[ "$RUNNER_OS" == "Windows" ]] && ext=".exe"
      #     # Replace "myapp" with your binary name; replace "./..." with your main package.
      #     go build -o "dist/myapp-${{ runner.os }}-${{ runner.arch }}${ext}" ./...

      # --- Node / TypeScript ---
      # - name: Build and package
      #   shell: bash
      #   run: |
      #     npm ci
      #     npm run build
      #     mkdir -p dist
      #     tar -czf "dist/${{ github.event.repository.name }}-${{ runner.os }}.tar.gz" -C build .

      # --- Python ---
      # - name: Build wheel and sdist
      #   run: |
      #     python -m pip install --upgrade pip build
      #     python -m build  # produces dist/*.whl and dist/*.tar.gz

      # --- Rust ---
      # - name: Build binary
      #   shell: bash
      #   run: |
      #     cargo build --release
      #     mkdir -p dist
      #     ext=""; [[ "$RUNNER_OS" == "Windows" ]] && ext=".exe"
      #     # Replace "myapp" with your binary name (must match Cargo.toml [[bin]] or package name).
      #     cp "target/release/myapp${ext}" "dist/myapp-${{ runner.os }}-${{ runner.arch }}${ext}"

      # --- Java (Gradle) ---
      # - name: Build jar
      #   run: ./gradlew build
      # - name: Stage artifacts
      #   shell: bash
      #   run: |
      #     mkdir -p dist
      #     cp build/libs/*.jar dist/

      # --- Shell scripts (no build, just bundle the repo) ---
      # - name: Bundle scripts
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     tag="${{ github.event.inputs.tag || github.ref_name }}"
      #     name="${{ github.event.repository.name }}-${tag}"
      #     mkdir -p dist
      #     # git archive produces clean source archives that match the exact tag.
      #     git archive --format=tar.gz --prefix="${name}/" -o "dist/${name}.tar.gz" HEAD
      #     git archive --format=zip   --prefix="${name}/" -o "dist/${name}.zip"    HEAD

      # =======================================================================
      # Upload artifacts (no edits needed below)
      # =======================================================================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/**
          if-no-files-found: warn
          retention-days: 7

  # ===========================================================================
  # RELEASE: pulls every artifact from the build matrix and creates the Release.
  # ===========================================================================
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts (debug)
        shell: bash
        run: |
          echo "Artifacts ready to upload:"
          find artifacts -type f -printf "  %p (%s bytes)\n" 2>/dev/null || ls -lR artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          # GitHub auto-generates release notes from PRs/commits since the last tag.
          generate_release_notes: true
          # Attach every file produced by the build job.
          files: artifacts/**/*
          fail_on_unmatched_files: false
